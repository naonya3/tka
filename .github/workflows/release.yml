name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dart-lang/setup-dart@e630b99d28a3b71860378cafdc2a067c71107f94 # v1.7.0
      - run: dart pub get
      - run: dart test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: tka-macos-arm64
          - os: ubuntu-latest
            artifact: tka-linux-x64
          - os: windows-latest
            artifact: tka-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dart-lang/setup-dart@e630b99d28a3b71860378cafdc2a067c71107f94 # v1.7.0
      - run: dart pub get
      - name: Build (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          dart compile exe bin/tka.dart -o build/${{ matrix.artifact }}
      - name: Build (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build -Force -ErrorAction SilentlyContinue
          dart compile exe bin/tka.dart -o build/${{ matrix.artifact }}.exe
        shell: pwsh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release create "$TAG_NAME" artifacts/* --repo "$REPO" --title "$TAG_NAME" --generate-notes
